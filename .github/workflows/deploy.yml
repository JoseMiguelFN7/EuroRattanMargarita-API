name: Build and Push to GHCR

on:
  push:
    branches: [production] # Se dispara cuando hagas merge a production

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial para que el token pueda subir la imagen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version Tag
        id: set_version
        run: echo "VERSION=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Usamos variables automáticas de GitHub para no hardcodear
          username: ${{ github.actor }} 
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Reemplaza 'josemiguelfn7/erm-api' por tu nombre de usuario/repo real
          tags: |
            ghcr.io/${{ github.repository_owner }}/erm-api:latest
            ghcr.io/${{ github.repository_owner }}/erm-api:${{ env.VERSION }}
          # Esto optimiza el build usando caché de GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Digest
        run: echo "Imagen subida con éxito. Digest ${{ steps.docker_build.outputs.digest }}"