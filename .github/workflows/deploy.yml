name: Build and Push to GHCR

on:
  push:
    branches: [production] # Se dispara cuando hagas merge a production

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Crucial para que el token pueda subir la imagen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version Tag
        id: set_version
        run: echo "VERSION=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Set lowercased image base name
        run: |
          # Convertimos dueño a minúsculas (josemiguelfn7)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Convertimos nombre del repo a minúsculas (eurorattanmargarita-api)
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          # Construimos la base de la imagen y la guardamos en $GITHUB_ENV
          echo "IMAGE_BASE=ghcr.io/$OWNER_LC/$REPO_LC" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Usamos variables automáticas de GitHub para no hardcodear
          username: ${{ github.actor }} 
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Reemplaza 'josemiguelfn7/erm-api' por tu nombre de usuario/repo real
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ env.VERSION }}
          # Esto optimiza el build usando caché de GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Digest
        run: echo "Imagen subida con éxito. Digest ${{ steps.docker_build.outputs.digest }}"