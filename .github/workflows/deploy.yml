name: Build, Push and Deploy to VPS

on:
  push:
    branches: [production] # Se dispara cuando hagas merge a production

jobs:
  # ==========================================
  # 1. INTEGRACIÓN CONTINUA (CI) - Compila y sube
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version Tag
        id: set_version
        run: echo "VERSION=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Set lowercased image base name
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_BASE=ghcr.io/$OWNER_LC/$REPO_LC" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} 
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # 2. DESPLIEGUE CONTINUO (CD) - Actualiza la VPS
  # ==========================================
  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue en la VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true 
          script: |
            # 1. Navegamos a la carpeta oficial de producción
            cd /var/www/eurorattanmgta.com
            
            # 2. Login en GHCR dentro de la VPS usando el token
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Descargar SOLO las imágenes frescas del backend
            docker compose pull api reverb queue scheduler
            
            # 4. Levantar SOLO contenedores del backend (MySQL y Redis subirán solos si están apagados)
            docker compose up -d api reverb queue scheduler
            
            # 5. Tareas de Laravel: Migraciones y caché
            docker exec erm_api php artisan migrate --force
            docker exec erm_api php artisan optimize:clear
            
            # 6. Reiniciar workers de colas
            docker exec erm_api php artisan queue:restart